services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      TRACELENS_DB_PATH: /data/tracelens.sqlite3
      TRACELENS_HTTP_TIMEOUT: "20"
      TRACELENS_USER_AGENT: TraceLens/0.7
    ports:
      - "8000:8000"
    volumes:
      - ./.tracelens:/data

  frontend:
    build:
      context: frontend
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
